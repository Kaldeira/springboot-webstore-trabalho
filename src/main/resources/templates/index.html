<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nemesis - Home</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/marque.css}">
    <link rel="stylesheet" th:href="@{/css/cursor.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/carrinho.css}">
    <link rel="stylesheet" th:href="@{/css/card-produtos.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@500;700&display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="cursor"></div>

<!-- overlay do carrinho -->
<div class="cart-overlay" id="cart-overlay" onclick="fecharCarrinho()"></div>
<div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-head">
        <div class="cart-drawer-title">Carrinho</div>
        <button class="cart-close" onclick="fecharCarrinho()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="cart-drawer-body" id="cart-body"></div>
    <div class="cart-drawer-foot" id="cart-foot" style="display:none">
        <div class="cart-subtotal">
            <span class="cart-subtotal-label">Subtotal</span>
            <span class="cart-subtotal-val" id="cart-total-val">R$ 0,00</span>
        </div>
        <p class="cart-frete-hint">Frete grátis para compras acima de R$ 499</p>
        <a href="/checkout" class="btn-checkout"><span>Finalizar compra</span></a>
    </div>
</div>

<div th:replace="fragments/marque :: marque_topo"></div>
<div th:replace="fragments/navbar :: navbar"></div>

<section class="hero">
    <div class="hero-slides">
        <div th:each="slide, stat : ${slides}"
             class="slide"
             th:classappend="${stat.index == 0} ? ' active'"
             th:style="|background-image: url('${slide.imagem}')|"
             th:data-link="${slide.link}">
            <div class="hero-left">
                <div class="hero-actions">
                    <a id="heroBtn" th:href="${slide.link}" class="btn-primary">Ver coleção</a>
                </div>
            </div>
        </div>
    </div>
    <div class="hero-line"></div>
</section>

<section class="products-section reveal" id="produtos">
    <div class="section-header">
        <h2 class="section-title">Lançamentos</h2>
        <a href="#" class="section-link">Ver todos</a>
    </div>
    <div class="products-grid">
        <div th:if="${ultimos_produtos == null or #lists.isEmpty(ultimos_produtos)}"
             style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-family:var(--font-cond);letter-spacing:.1em;text-transform:uppercase">
            Nenhum produto disponível no momento
        </div>

        <div th:each="p : ${ultimos_produtos}"
             class="product-card"
             th:data-id="${p.id}"
             th:data-nome="${p.nome}"
             th:data-preco="${p.preco}"
             th:data-img="${imagemMap != null and imagemMap[p.id] != null ? imagemMap[p.id] : ''}">

            <a th:href="@{/produto/{id}(id=${p.id})}" class="card-link">
                <div class="product-img-wrap">
                    <div class="card-imgs" th:data-card-id="${p.id}">
                        <div th:each="url, us : ${imagensMap != null and imagensMap[p.id] != null ? imagensMap[p.id] : (imagemMap != null and imagemMap[p.id] != null ? #lists.listOf(imagemMap[p.id]) : #lists.listOf(''))}"
                             class="card-img-slide"
                             th:classappend="${us.index == 0} ? ' active'">
                            <img th:if="${!#strings.isEmpty(url)}" th:src="@{${url}}" th:alt="${p.nome}" class="product-img"/>
                            <div th:if="${#strings.isEmpty(url)}"
                                 class="product-img-bg"
                                 th:text="${#strings.substring(p.nome, 0, 3).toUpperCase()}">???</div>
                        </div>
                    </div>

                    <span class="product-badge badge-new">Novo</span>

                    <button class="card-arrow card-arrow-prev"
                            th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}"
                            th:onclick="'event.preventDefault();cardNav(event,this.closest(\'.product-card\'),-1)'"
                            type="button"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="card-arrow card-arrow-next"
                            th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}"
                            th:onclick="'event.preventDefault();cardNav(event,this.closest(\'.product-card\'),1)'"
                            type="button"><i class="fa-solid fa-chevron-right"></i></button>

                    <div class="card-dots"
                         th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}">
                        <div th:each="u, us2 : ${imagensMap[p.id]}"
                             class="card-dot"
                             th:classappend="${us2.index == 0} ? ' active'"></div>
                    </div>

<!--                    <button class="product-quick"-->
<!--                            th:onclick="'event.preventDefault();abrirModal(' + ${p.id} + ')'"-->
<!--                            type="button">Comprar rápido-->
<!--                    </button>-->

                    <button class="product-quick"
                            th:href="@{/produto/{id}(id=${p.id})}"
                            type="button">Comprar
                    </button>


                </div>

                <div class="product-info">
                    <div class="product-name" th:text="${p.nome}">Produto</div>
                    <div class="product-sizes" th:if="${variantesMap != null and variantesMap[p.id] != null}">
                    <span th:each="v, vs : ${variantesMap[p.id]}"
                          th:if="${vs.index < 5}"
                          class="size-dot"
                          th:text="${v.tamanho}"></span>
                        <span th:if="${variantesMap[p.id].size() > 5}" class="size-dot"
                              th:text="'+' + ${variantesMap[p.id].size() - 5}"></span>
                    </div>
                    <div class="product-price"
                         th:text="'R$ ' + ${#numbers.formatDecimal(p.preco, 1, 'POINT', 2, 'COMMA')}">R$ 0,00
                    </div>
                    <div class="product-installment"
                         th:text="'3x de R$ ' + ${#numbers.formatDecimal(p.preco / 3, 1, 'POINT', 2, 'COMMA')} + ' sem juros'"></div>
                </div>
            </a>
        </div>
    </div>
</section>


<div th:replace="fragments/footer :: rodape"></div>

<script th:src="@{/js/cursor.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const slides = document.querySelectorAll('.slide');
        const heroBtn = document.getElementById('heroBtn');
        if (slides.length > 1) {
            let cur = 0;
            setInterval(() => {
                slides[cur].classList.remove('active');
                cur = (cur + 1) % slides.length;
                slides[cur].classList.add('active');
                if (heroBtn) heroBtn.href = slides[cur].dataset.link || '#';
            }, 4000);
        }

        atualizarContador();
        renderizarCarrinho();
    });
</script>
</body>
</html>
