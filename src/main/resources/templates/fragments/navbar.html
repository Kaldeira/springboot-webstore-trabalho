<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
<div th:fragment="navbar">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <nav>
        <a href="#" class="nav-logo">nemesis</a>

        <ul class="nav-links">
            <li>
                <a th:href="@{/}"
                   th:classappend="${telaAtiva == 'home'} ? ' active' : ''">
                    Lançamentos
                </a>
            </li>

            <li class="dropdown">
                <a href="#">
                    Superior
                    <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                </a>

                <ul class="dropdown-menu">
                    <li><a th:href="@{/categoria/camisetas}">T-Shirt & Camisas</a></li>
                    <li><a th:href="@{/categoria/Moletons}">Moletom & Jaquetas</a></li>
                </ul>
            </li>

            <li class="dropdown">
                <a href="#">
                    Inferior
                    <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                </a>

                <ul class="dropdown-menu">
                    <li><a th:href="@{/categoria/calcas}">Calças</a></li>
                    <li><a  th:href="@{/categoria/shorts}">Shorts</a></li>
                </ul>
            </li>

            <li><a href="#">Sale</a></li>
            <li  th:if="${session.usuarioLogado != null && session.usuarioLogado.getTipo().ordinal() != 1}">
                <a th:href="@{/panelProdutos}">Painel Funcionarios</a>
            </li>
        </ul>
        <div class="nav-right">

            <!-- se n estiver logado -->
            <a th:if="${session.usuarioLogado == null}"
               th:href="@{/login}"
               class="login-btn">
                <i class="fa-solid fa-user"></i>
                Login
            </a>

            <!-- se estiver logado -->
            <a th:if="${session.usuarioLogado != null}"
               th:href="@{/perfil}"
               class="login-btn">
                <i class="fa-solid fa-user"></i>
                <span th:text="${session.usuarioLogado.nome}"></span>
            </a>

            <form th:if="${session.usuarioLogado != null}" th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair
                </button>
            </form>
<!--            </a>-->


            <button class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count">0</span>
            </button>
        </div>

    </nav>
</div>
</body>
</html>
