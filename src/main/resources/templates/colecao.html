<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nemesis - Camisetas</title>

    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/categoria.css}">
    <link rel="stylesheet" th:href="@{/css/cursor.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/card-produtos.css}">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@500;700&display=swap"
          rel="stylesheet"/>

    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap"
          rel="stylesheet"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="cursor"></div>

<div th:replace="fragments/navbar :: navbar"></div>

<section class="categoria-page">

    <aside class="filters-sidebar">

        <div class="filter-header">
            <span class="filter-header-label">Filtros</span>
            <button class="filter-close-mobile" onclick="closeSidebar()">✕</button>
        </div>

        <div class="filter-group">
            <div class="filter-title" onclick="toggleGroup(this)">
                Tamanho
                <span class="filter-title-icon">›</span>
            </div>

            <div class="filter-body">
                <label class="filter-option"
                       th:each="tamanho : ${tamanhos}">

                    <input type="checkbox"
                           class="filter-tamanho"
                           th:value="${tamanho}">

                    <span class="filter-option-inner">
                    <span class="filter-check"></span>
                    <span class="filter-option-text" th:text="${tamanho}">P</span>
                </span>
                </label>
            </div>
        </div>

    </aside>

    <main class="categoria-content">

        <div class="categoria-top">
            <div>
                <div class="categoria-label">Coleção</div>
                <h1 class="categoria-title" th:text="${categoriaNome}"></h1>
            </div>

            <div class="categoria-count">
                <span th:text="${#lists.size(produtos)} + ' produtos'">0 Produtos</span>
            </div>
        </div>

        <div class="products-grid">

            <div th:each="p : ${produtos}"
                 class="product-card"

                 th:data-id="${p.id}"

                 th:data-tamanhos="${tamanhosProdutoMap[p.id]}">

                <a th:href="@{/produto/{id}(id=${p.id})}" class="card-link">
                    <div class="product-img-wrap">
                        <div class="card-imgs" th:data-card-id="${p.id}">
                            <div th:each="url, us : ${imagensMap != null and imagensMap[p.id] != null ? imagensMap[p.id] : null}"
                                 class="card-img-slide"
                                 th:classappend="${us.index == 0} ? ' active'">
                                <img th:if="${!#strings.isEmpty(url)}" th:src="@{${url}}" th:alt="${p.nome}"
                                     class="product-img"/>
                                <div th:if="${#strings.isEmpty(url)}"
                                     class="product-img-bg"
                                     th:text="${#strings.substring(p.nome, 0, 3).toUpperCase()}">???
                                </div>
                            </div>
                        </div>

                        <span class="product-badge badge-new">Novo</span>

                        <button class="card-arrow card-arrow-prev"
                                th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}"
                                th:onclick="'event.preventDefault();cardNav(event,this.closest(\'.product-card\'),-1)'"
                                type="button"><i class="fa-solid fa-chevron-left"></i></button>
                        <button class="card-arrow card-arrow-next"
                                th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}"
                                th:onclick="'event.preventDefault();cardNav(event,this.closest(\'.product-card\'),1)'"
                                type="button"><i class="fa-solid fa-chevron-right"></i></button>

                        <div class="card-dots"
                             th:if="${imagensMap != null and imagensMap[p.id] != null and #lists.size(imagensMap[p.id]) > 1}">
                            <div th:each="u, us2 : ${imagensMap[p.id]}"
                                 class="card-dot"
                                 th:classappend="${us2.index == 0} ? ' active'"></div>
                        </div>

                        <!--                    <button class="product-quick"-->
                        <!--                            th:onclick="'event.preventDefault();abrirModal(' + ${p.id} + ')'"-->
                        <!--                            type="button">Comprar rápido-->
                        <!--                    </button>-->

                        <button class="product-quick"
                                th:href="@{/produto/{id}(id=${p.id})}"
                                type="button">Comprar
                        </button>


                    </div>

                    <div class="product-info">

                        <div class="product-name"
                             th:text="${p.nome}">
                            Produto
                        </div>

                        <div class="product-price"
                             th:text="'R$ ' + ${#numbers.formatDecimal(p.preco,1,'POINT',2,'COMMA')}">
                            R$ 0,00
                        </div>

                        <div class="product-installment"
                             th:text="'3x de R$ ' + ${#numbers.formatDecimal(p.preco / 3,1,'POINT',2,'COMMA')} + ' sem juros'">
                        </div>

                    </div>
                </a>

            </div>

        </div>

    </main>

</section>

<div th:replace="fragments/footer :: rodape"></div>

<script th:src="@{/js/cursor.js}"></script>
<script th:src="@{/js/filtro.js}"></script>
<script th:src="@{/js/cards.js}"></script>

<script th:inline="javascript">
    <![CDATA[
    var VARIANTES_DATA = [[${variantesJson}]] {};
    ]]>
</script>

<script th:src="@{/js/carrinho.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const slides = document.querySelectorAll('.slide');
        const heroBtn = document.getElementById('heroBtn');
        if (slides.length > 1) {
            let cur = 0;
            setInterval(() => {
                slides[cur].classList.remove('active');
                cur = (cur + 1) % slides.length;
                slides[cur].classList.add('active');
                if (heroBtn) heroBtn.href = slides[cur].dataset.link || '#';
            }, 4000);
        }

        atualizarContador();
        renderizarCarrinho();
    });
</script>

</body>
</html>
